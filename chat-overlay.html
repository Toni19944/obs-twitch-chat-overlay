<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Chat Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
}

#feed {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 4px;
  padding: 10px;
  max-height: 100vh;
  overflow: hidden;
}

.msg {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 4px;
  line-height: 1.5;
  word-break: break-word;
  overflow-wrap: anywhere;
  background: rgba(0, 0, 0, 0.22);
  border-radius: 6px;
  padding: 4px 8px;
  transition: opacity 1.5s ease,
              max-height 0.6s ease 1.4s,
              padding 0.6s ease 1.4s,
              margin 0.6s ease 1.4s;
  max-height: 200px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.dying {
  opacity: 0 !important;
  max-height: 0 !important;
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  margin: 0 !important;
  pointer-events: none;
}

.badges {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
  position: relative;
  top: 2px;
}

.badge-img {
  width: 18px;
  height: 18px;
  display: block;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.85));
}
.badge-img[data-broken="1"] { display: none; }

.username {
  font-weight: 700;
  flex-shrink: 0;
  text-shadow:
    0 0 6px rgba(0,0,0,0.95),
    0 1px 4px rgba(0,0,0,1),
    1px 1px 0 rgba(0,0,0,0.85);
}

.colon {
  color: rgba(255,255,255,0.45);
  flex-shrink: 0;
  text-shadow: 0 1px 3px rgba(0,0,0,1);
}

/* Message body — inline mix of text and emote images */
.body {
  display: inline;
  color: #f0f0f0;
  text-shadow:
    0 0 5px rgba(0,0,0,0.95),
    0 1px 4px rgba(0,0,0,1),
    1px 1px 0 rgba(0,0,0,0.85);
}

.emote-img {
  /* Sit inline with text, vertically centered */
  display: inline-block;
  width: auto;
  height: 22px;
  vertical-align: middle;
  margin: 0 1px;
  position: relative;
  top: -1px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
}
.emote-img[data-broken="1"] { display: none; }

.sysmsg {
  font-size: 12px;
  font-style: italic;
  color: #cc88ff;
  padding: 3px 8px;
  text-shadow: 0 1px 4px rgba(0,0,0,1);
  animation: fadeIn 0.2s ease;
  transition: opacity 1.5s ease,
              max-height 0.6s ease 1.4s,
              padding 0.6s ease 1.4s,
              margin 0.6s ease 1.4s;
  max-height: 200px;
}
.sysmsg.dying {
  opacity: 0 !important;
  max-height: 0 !important;
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  margin: 0 !important;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="feed"></div>
<script>
// ─── CONFIG ──────────────────────────────────────
var CHANNEL    = 'CHANNEL NAME';
var MAX_MSGS   = 25;
var FADE_AFTER = 30000; // ms — set to 999999999 to effectively disable
// ─────────────────────────────────────────────────

var feed = document.getElementById('feed');
var ws   = null;
var retryTimer = null;

// ── Badge CDN URLs ────────────────────────────────────────────────────────
var CDN = 'https://static-cdn.jtvnw.net/badges/v1/';
var BADGE_URLS = {
  'broadcaster': CDN + '5527c58c-fb7d-422d-b71b-f309dcb85cc1/2',
  'moderator':   CDN + '3267646d-33f0-4b17-b3df-f923a41db1d0/2',
  'vip':         CDN + 'b817aba4-fad8-49e2-b88a-7cc744dfa6ec/2',
  'subscriber':  CDN + '5d9f2208-5dd8-11e7-8513-2ff4adfae661/2',
  'premium':     CDN + 'bbbe0db0-a598-423e-86d0-f9fb98ca1933/2',
  'turbo':       CDN + 'bd444ec6-8f34-4bf9-91f4-af1e3428d80f/2',
  'partner':     CDN + 'd12a2e27-16f6-41d0-ab77-b780518f00a3/2',
  'staff':       CDN + 'd97c37be-e797-4a18-a3ae-31d92135e8a0/2',
  'admin':       CDN + '9ef7e029-4cdf-4d4d-a0d5-e2b3fb2583fe/2',
  'global_mod':  CDN + '9384c428-3380-48c4-820d-0e1f4d500071/2',
  'bits':        CDN + '73b5c3fb-24f9-4a82-a852-2f475ad29d43/2',
};

function getBadgeUrl(setName) {
  return BADGE_URLS[setName] || null;
}

// ── Emote CDN URL ─────────────────────────────────────────────────────────
function getEmoteUrl(emoteId) {
  // Works for all Twitch emotes: global, sub, bits, follower — anything native.
  return 'https://static-cdn.jtvnw.net/emoticons/v2/' + emoteId + '/default/dark/2.0';
}

// ── Parse emotes tag into a sorted map of ranges → emote id ──────────────
// emotes tag format: "id:start-end,start-end/id:start-end/..."
// Positions are byte offsets into the raw UTF-8 message text.
function parseEmotes(emoteTag) {
  // Returns array of {id, start, end} sorted by start position
  if (!emoteTag) return [];
  var result = [];
  var groups = emoteTag.split('/');
  for (var i = 0; i < groups.length; i++) {
    if (!groups[i]) continue;
    var colon = groups[i].indexOf(':');
    if (colon < 0) continue;
    var id = groups[i].slice(0, colon);
    var ranges = groups[i].slice(colon + 1).split(',');
    for (var j = 0; j < ranges.length; j++) {
      var dash = ranges[j].indexOf('-');
      if (dash < 0) continue;
      result.push({
        id:    id,
        start: parseInt(ranges[j].slice(0, dash), 10),
        end:   parseInt(ranges[j].slice(dash + 1), 10) // inclusive
      });
    }
  }
  result.sort(function(a, b) { return a.start - b.start; });
  return result;
}

// ── Build message body (text + emote images) ──────────────────────────────
// Twitch emote positions are codepoint indices into the message string.
function buildBody(text, emoteTag) {
  var frag = document.createDocumentFragment();
  var emotes = parseEmotes(emoteTag);

  if (!emotes.length) {
    // No emotes — plain text node
    frag.appendChild(document.createTextNode(text));
    return frag;
  }

  // Convert string to array of codepoints so we index correctly
  // (handles emoji / surrogate pairs in chat text)
  var chars = [];
  for (var i = 0; i < text.length; ) {
    var code = text.codePointAt(i);
    chars.push(text.charAt(i));
    // surrogate pair takes 2 JS chars
    i += (code > 0xFFFF) ? 2 : 1;
  }

  var cursor = 0;
  for (var e = 0; e < emotes.length; e++) {
    var em = emotes[e];
    // Text before this emote
    if (em.start > cursor) {
      var beforeText = chars.slice(cursor, em.start).join('');
      if (beforeText) frag.appendChild(document.createTextNode(beforeText));
    }
    // Emote image
    var img = document.createElement('img');
    img.className = 'emote-img';
    img.src   = getEmoteUrl(em.id);
    img.alt   = chars.slice(em.start, em.end + 1).join(''); // e.g. "PogChamp"
    img.title = img.alt;
    img.onerror = function() { this.setAttribute('data-broken', '1'); };
    frag.appendChild(img);

    cursor = em.end + 1;
  }

  // Any remaining text after the last emote
  if (cursor < chars.length) {
    var afterText = chars.slice(cursor).join('');
    if (afterText) frag.appendChild(document.createTextNode(afterText));
  }

  return frag;
}

// ── IRC connection ────────────────────────────────────────────────────────
function connect() {
  if (ws) {
    ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
    ws.close();
    ws = null;
  }
  if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }

  ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  ws.onopen = function() {
    ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
    ws.send('PASS SCHMOOPIIE');
    ws.send('NICK justinfan' + (10000 + Math.floor(Math.random() * 80000)));
    ws.send('JOIN #' + CHANNEL);
  };

  ws.onmessage = function(evt) {
    var lines = evt.data.split('\r\n');
    for (var i = 0; i < lines.length; i++) {
      if (lines[i]) onLine(lines[i]);
    }
  };

  ws.onclose = function() { retryTimer = setTimeout(connect, 4000); };
  ws.onerror = function() { ws.close(); };
}

function onLine(line) {
  if (line.slice(0, 4) === 'PING') {
    if (ws && ws.readyState === 1) ws.send('PONG :tmi.twitch.tv');
    return;
  }

  var tags = {};
  if (line.charAt(0) === '@') {
    var sp    = line.indexOf(' ');
    var pairs = line.slice(1, sp).split(';');
    for (var i = 0; i < pairs.length; i++) {
      var eq = pairs[i].indexOf('=');
      if (eq > -1) tags[pairs[i].slice(0, eq)] = pairs[i].slice(eq + 1);
    }
    line = line.slice(sp + 1);
  }

  var parts  = line.split(' ');
  var prefix = parts[0];
  var cmd    = parts[1];

  if (cmd === 'PRIVMSG') {
    var bang = prefix.indexOf('!');
    var nick = bang > -1 ? prefix.slice(1, bang) : prefix.slice(1);
    var ci   = line.indexOf(':', line.indexOf('PRIVMSG'));
    var text = ci > -1 ? line.slice(ci + 1) : '';
    addMsg({
      display:  tags['display-name'] || nick,
      color:    tags['color']        || autoColor(nick),
      badges:   tags['badges']       || '',
      emotes:   tags['emotes']       || '',
      text:     text
    });
  }

  if (cmd === 'USERNOTICE') {
    var sys = (tags['system-msg'] || '').replace(/\\s/g, ' ');
    if (sys) addSys(sys);
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────
function scheduleFade(el) {
  setTimeout(function() {
    el.classList.add('dying');
    setTimeout(function() {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 2700);
  }, FADE_AFTER);
}

function addMsg(m) {
  var div = document.createElement('div');
  div.className = 'msg';

  // Badges
  var badgePairs = parseBadges(m.badges);
  if (badgePairs.length) {
    var wrap = document.createElement('span');
    wrap.className = 'badges';
    var added = 0;
    for (var i = 0; i < badgePairs.length; i++) {
      var url = getBadgeUrl(badgePairs[i].set);
      if (url) {
        var bimg = document.createElement('img');
        bimg.className = 'badge-img';
        bimg.alt   = badgePairs[i].set;
        bimg.title = badgePairs[i].set;
        bimg.onerror = function() { this.setAttribute('data-broken', '1'); };
        bimg.src = url;
        wrap.appendChild(bimg);
        added++;
      }
    }
    if (added) div.appendChild(wrap);
  }

  // Username
  var nameEl = document.createElement('span');
  nameEl.className = 'username';
  nameEl.style.color = m.color;
  nameEl.textContent = m.display;
  div.appendChild(nameEl);

  // Colon
  var colon = document.createElement('span');
  colon.className = 'colon';
  colon.textContent = ':';
  div.appendChild(colon);

  // Message body (text + emotes)
  var body = document.createElement('span');
  body.className = 'body';
  body.appendChild(buildBody(m.text, m.emotes));
  div.appendChild(body);

  feed.appendChild(div);
  trim();
  scheduleFade(div);
}

function addSys(text) {
  var div = document.createElement('div');
  div.className = 'sysmsg';
  div.textContent = '★ ' + text;
  feed.appendChild(div);
  trim();
  scheduleFade(div);
}

function trim() {
  while (feed.children.length > MAX_MSGS) {
    feed.removeChild(feed.firstChild);
  }
}

function parseBadges(raw) {
  if (!raw) return [];
  var out   = [];
  var parts = raw.split(',');
  for (var i = 0; i < parts.length; i++) {
    var slash = parts[i].indexOf('/');
    if (slash > -1) {
      out.push({ set: parts[i].slice(0, slash), version: parts[i].slice(slash + 1) });
    }
  }
  return out;
}

function autoColor(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  return 'hsl(' + (Math.abs(h) % 360) + ',65%,65%)';
}

connect();
</script>
</body>
</html>
