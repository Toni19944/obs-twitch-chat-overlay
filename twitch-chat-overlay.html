<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Chat Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
}

#feed {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 4px;
  padding: 10px;
  max-height: 100vh;
  overflow: hidden;
}

.msg {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 4px;
  line-height: 1.5;
  word-break: break-word;
  overflow-wrap: anywhere;
  background: rgba(0, 0, 0, 0.22);
  border-radius: 6px;
  padding: 4px 8px;
  /* (#1) Opacity-only transition — no layout-thrashing max-height/padding/margin */
  transition: opacity 1.5s ease;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.dying {
  opacity: 0 !important;
  pointer-events: none;
}
.badges {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
  position: relative;
  top: 2px;
}
.badge-img {
  width: 18px;
  height: 18px;
  display: block;
  /* (#2) Removed filter: drop-shadow — background provides contrast */
}
.username {
  font-weight: 700;
  flex-shrink: 0;
  /* (#3) Single text-shadow for readability */
  text-shadow: 0 1px 3px rgba(0,0,0,1);
}
.colon {
  color: rgba(255,255,255,0.45);
  flex-shrink: 0;
  text-shadow: 0 1px 3px rgba(0,0,0,1);
}
.body {
  display: inline;
  color: #f0f0f0;
  /* (#3) Single text-shadow for readability */
  text-shadow: 0 1px 3px rgba(0,0,0,1);
}
.emote-img {
  display: inline-block;
  height: 22px;
  width: auto;
  vertical-align: middle;
  margin: 0 1px;
  position: relative;
  top: -1px;
  /* (#2) Removed filter: drop-shadow — background provides contrast */
}
.sysmsg {
  font-size: 12px;
  font-style: italic;
  color: #cc88ff;
  padding: 3px 8px;
  text-shadow: 0 1px 4px rgba(0,0,0,1);
  animation: fadeIn 0.2s ease;
  /* (#1) Opacity-only transition */
  transition: opacity 1.5s ease;
}
.sysmsg.dying {
  opacity: 0 !important;
  pointer-events: none;
}

/* Shown if no channel param is given */
#nochannel {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  text-shadow: 0 1px 3px rgba(0,0,0,1);
}
</style>
</head>
<body>
<div id="feed"></div>
<div id="nochannel" style="display:none">No channel specified — use the setup page to generate your URL.</div>
<script>
// ── Read config from URL parameters ───────────────────────────────────────
var params = new URLSearchParams(window.location.search);

var CHANNEL              = (params.get('channel')       || '').toLowerCase().trim();
var MAX_MSGS             = parseInt(params.get('max')    || '25', 10);
var FADE_AFTER           = parseInt(params.get('fade')  || '30000', 10);
var TWITCH_CLIENT_ID     = params.get('client_id')      || '';
var TWITCH_CLIENT_SECRET = params.get('client_secret')  || '';
// ─────────────────────────────────────────────────────────────────────────

if (!CHANNEL) {
  document.getElementById('nochannel').style.display = 'flex';
} else {
  var feed = document.getElementById('feed');
  var ws = null, retryTimer = null, dataLoaded = false;
  var badgeMap = {};
  var thirdPartyEmotes = {};

  // ── Badge fallbacks ─────────────────────────────────────────────────────
  var BCDN = 'https://static-cdn.jtvnw.net/badges/v1/';
  var BADGE_FALLBACKS = {
    'broadcaster': BCDN + '5527c58c-fb7d-422d-b71b-f309dcb85cc1/2',
    'moderator':   BCDN + '3267646d-33f0-4b17-b3df-f923a41db1d0/2',
    'vip':         BCDN + 'b817aba4-fad8-49e2-b88a-7cc744dfa6ec/2',
    'subscriber':  BCDN + '5d9f2208-5dd8-11e7-8513-2ff4adfae661/2',
    'premium':     BCDN + 'bbbe0db0-a598-423e-86d0-f9fb98ca1933/2',
    'turbo':       BCDN + 'bd444ec6-8f34-4bf9-91f4-af1e3428d80f/2',
    'partner':     BCDN + 'd12a2e27-16f6-41d0-ab77-b780518f00a3/2',
    'staff':       BCDN + 'd97c37be-e797-4a18-a3ae-31d92135e8a0/2',
    'bits':        BCDN + '73b5c3fb-24f9-4a82-a852-2f475ad29d43/2',
  };

  function getBadgeUrl(setName, version) {
    if (badgeMap[setName]) {
      return badgeMap[setName][version] || badgeMap[setName]['0'] || null;
    }
    return BADGE_FALLBACKS[setName] || null;
  }

  // (#7) Debounced badge refresh — collapses rapid calls into one DOM scan
  var badgeRefreshTimer = null;
  function refreshBadgesInDom() {
    if (badgeRefreshTimer) clearTimeout(badgeRefreshTimer);
    badgeRefreshTimer = setTimeout(function() {
      badgeRefreshTimer = null;
      var imgs = feed.querySelectorAll('img.badge-img');
      for (var i = 0; i < imgs.length; i++) {
        var img     = imgs[i];
        var setName = img.getAttribute('data-set');
        var version = img.getAttribute('data-version');
        if (!setName) continue;
        var url = getBadgeUrl(setName, version);
        if (url && img.src !== url) img.src = url;
      }
    }, 200);
  }

  // ── Data loading ──────────────────────────────────────────────────────
  function loadAllData(roomId) {
    loadBTTV(roomId);
    loadFFZ();
    load7TV(roomId);
    if (TWITCH_CLIENT_ID && TWITCH_CLIENT_SECRET) {
      getAppToken(function(token) {
        if (token) loadBadgesHelix(roomId, token);
        else       loadBadgesV1(roomId);
      });
    } else {
      loadBadgesV1(roomId);
    }
  }

  function getAppToken(cb) {
    fetch('https://id.twitch.tv/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'client_id=' + TWITCH_CLIENT_ID +
            '&client_secret=' + TWITCH_CLIENT_SECRET +
            '&grant_type=client_credentials'
    })
      .then(function(r) { return r.json(); })
      .then(function(d) { cb(d.access_token || null); })
      .catch(function() { cb(null); });
  }

  function loadBadgesHelix(roomId, token) {
    var headers = {
      'Client-ID': TWITCH_CLIENT_ID,
      'Authorization': 'Bearer ' + token
    };
    function ingest(data) {
      (data.data || []).forEach(function(badge) {
        var setName = badge.set_id;
        if (!badgeMap[setName]) badgeMap[setName] = {};
        (badge.versions || []).forEach(function(ver) {
          badgeMap[setName][ver.id] = ver.image_url_2x || ver.image_url_1x;
        });
      });
      refreshBadgesInDom();
    }
    // Load global first, THEN channel — so channel badges always override global ones
    fetch('https://api.twitch.tv/helix/chat/badges/global', { headers: headers })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        ingest(data);
        // Channel badges loaded after global so they win any key conflicts
        return fetch('https://api.twitch.tv/helix/chat/badges?broadcaster_id=' + roomId, { headers: headers });
      })
      .then(function(r) { return r.json(); })
      .then(ingest)
      .catch(function() {});
  }

  function loadBadgesV1(roomId) {
    function ingest(data) {
      var sets = data && data.badge_sets;
      if (!sets) return;
      Object.keys(sets).forEach(function(setName) {
        var versions = sets[setName].versions || {};
        if (!badgeMap[setName]) badgeMap[setName] = {};
        Object.keys(versions).forEach(function(ver) {
          badgeMap[setName][ver] = versions[ver].image_url_2x || versions[ver].image_url_1x;
        });
      });
      refreshBadgesInDom();
    }
    fetch('https://badges.twitch.tv/v1/badges/global/display')
      .then(function(r) { return r.json(); }).then(ingest).catch(function() {});
    fetch('https://badges.twitch.tv/v1/badges/channels/' + roomId + '/display')
      .then(function(r) { return r.json(); }).then(ingest).catch(function() {});
  }

  function loadBTTV(roomId) {
    fetch('https://api.betterttv.net/3/cached/emotes/global')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!Array.isArray(data)) return;
        data.forEach(function(e) {
          thirdPartyEmotes[e.code] = 'https://cdn.betterttv.net/emote/' + e.id + '/2x';
        });
      }).catch(function() {});
    fetch('https://api.betterttv.net/3/cached/users/twitch/' + roomId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var emotes = (data.channelEmotes || []).concat(data.sharedEmotes || []);
        emotes.forEach(function(e) {
          thirdPartyEmotes[e.code] = 'https://cdn.betterttv.net/emote/' + e.id + '/2x';
        });
      }).catch(function() {});
  }

  function loadFFZ() {
    fetch('https://api.frankerfacez.com/v1/room/' + CHANNEL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var sets = data.sets || {};
        Object.keys(sets).forEach(function(setId) {
          (sets[setId].emoticons || []).forEach(function(e) {
            if (!e.name || !e.urls) return;
            var url = e.urls['2'] || e.urls['1'];
            if (!url) return;
            if (url.slice(0, 2) === '//') url = 'https:' + url;
            thirdPartyEmotes[e.name] = url;
          });
        });
      }).catch(function() {});
  }

  function load7TV(roomId) {
    fetch('https://7tv.io/v3/emote-sets/global')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        (data.emotes || []).forEach(function(e) {
          if (e.name && e.id)
            thirdPartyEmotes[e.name] = 'https://cdn.7tv.app/emote/' + e.id + '/2x.webp';
        });
      }).catch(function() {});
    fetch('https://7tv.io/v3/users/twitch/' + roomId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var emotes = (data.emote_set && data.emote_set.emotes) || [];
        emotes.forEach(function(e) {
          if (e.name && e.id)
            thirdPartyEmotes[e.name] = 'https://cdn.7tv.app/emote/' + e.id + '/2x.webp';
        });
      }).catch(function() {});
  }

  // ── IRC ──────────────────────────────────────────────────────────────
  function connect() {
    if (ws) {
      ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
      ws.close(); ws = null;
    }
    if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
    ws.onopen = function() {
      ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
      ws.send('PASS SCHMOOPIIE');
      ws.send('NICK justinfan' + (10000 + Math.floor(Math.random() * 80000)));
      ws.send('JOIN #' + CHANNEL);
    };
    ws.onmessage = function(evt) {
      var lines = evt.data.split('\r\n');
      for (var i = 0; i < lines.length; i++) { if (lines[i]) onLine(lines[i]); }
    };
    ws.onclose = function() { retryTimer = setTimeout(connect, 4000); };
    ws.onerror = function() { ws.close(); };
  }

  function onLine(line) {
    if (line.slice(0, 4) === 'PING') {
      if (ws && ws.readyState === 1) ws.send('PONG :tmi.twitch.tv');
      return;
    }
    var tags = {};
    if (line.charAt(0) === '@') {
      var sp    = line.indexOf(' ');
      var pairs = line.slice(1, sp).split(';');
      for (var i = 0; i < pairs.length; i++) {
        var eq = pairs[i].indexOf('=');
        if (eq > -1) tags[pairs[i].slice(0, eq)] = pairs[i].slice(eq + 1);
      }
      line = line.slice(sp + 1);
    }
    var parts  = line.split(' ');
    var prefix = parts[0];
    var cmd    = parts[1];
    if (cmd === 'ROOMSTATE' && tags['room-id'] && !dataLoaded) {
      dataLoaded = true;
      loadAllData(tags['room-id']);
    }
    if (cmd === 'PRIVMSG') {
      var bang = prefix.indexOf('!');
      var nick = bang > -1 ? prefix.slice(1, bang) : prefix.slice(1);
      var ci   = line.indexOf(':', line.indexOf('PRIVMSG'));
      var text = ci > -1 ? line.slice(ci + 1) : '';
      addMsg({
        display: tags['display-name'] || nick,
        color:   tags['color']        || autoColor(nick),
        badges:  tags['badges']       || '',
        emotes:  tags['emotes']       || '',
        text:    text
      });
    }
    if (cmd === 'USERNOTICE') {
      var sys = (tags['system-msg'] || '').replace(/\\s/g, ' ');
      if (sys) addSys(sys);
    }
  }

  // ── Emotes ────────────────────────────────────────────────────────────
  function getEmoteUrl(id) {
    return 'https://static-cdn.jtvnw.net/emoticons/v2/' + id + '/default/dark/2.0';
  }

  function parseTwitchEmotes(tag) {
    if (!tag) return [];
    var result = [];
    var groups = tag.split('/');
    for (var i = 0; i < groups.length; i++) {
      if (!groups[i]) continue;
      var colon = groups[i].indexOf(':');
      if (colon < 0) continue;
      var id = groups[i].slice(0, colon);
      var ranges = groups[i].slice(colon + 1).split(',');
      for (var j = 0; j < ranges.length; j++) {
        var dash = ranges[j].indexOf('-');
        if (dash < 0) continue;
        result.push({
          id:    id,
          start: parseInt(ranges[j].slice(0, dash), 10),
          end:   parseInt(ranges[j].slice(dash + 1), 10)
        });
      }
    }
    result.sort(function(a, b) { return a.start - b.start; });
    return result;
  }

  function toCodepoints(str) {
    var arr = [];
    for (var i = 0; i < str.length; ) {
      var code = str.codePointAt(i);
      arr.push(String.fromCodePoint(code));
      i += code > 0xFFFF ? 2 : 1;
    }
    return arr;
  }

  // (#6) Fast check — does the string contain surrogate pairs?
  function hasSurrogates(str) {
    for (var i = 0; i < str.length; i++) {
      if (str.charCodeAt(i) >= 0xD800) return true;
    }
    return false;
  }

  function buildBody(text, emoteTag) {
    var frag   = document.createDocumentFragment();
    var twitch = parseTwitchEmotes(emoteTag);

    // (#6) Skip codepoint array for pure BMP text (vast majority of messages)
    var needsCp = hasSurrogates(text);
    var chars   = needsCp ? toCodepoints(text) : null;
    var len     = needsCp ? chars.length : text.length;

    var cursor = 0;
    for (var e = 0; e < twitch.length; e++) {
      var em = twitch[e];
      if (em.start > cursor) {
        var seg = needsCp ? chars.slice(cursor, em.start).join('') : text.substring(cursor, em.start);
        appendThirdParty(frag, seg);
      }
      var emoteName = needsCp ? chars.slice(em.start, em.end + 1).join('') : text.substring(em.start, em.end + 1);
      appendEmote(frag, getEmoteUrl(em.id), emoteName);
      cursor = em.end + 1;
    }
    if (cursor < len) {
      var tail = needsCp ? chars.slice(cursor).join('') : text.substring(cursor);
      appendThirdParty(frag, tail);
    }
    return frag;
  }

  // (#5) Batch consecutive non-emote words into a single text node
  function appendThirdParty(frag, text) {
    var words = text.split(' ');
    var buf   = '';
    for (var i = 0; i < words.length; i++) {
      if (i > 0) buf += ' ';
      var word = words[i];
      if (!word) continue;
      if (thirdPartyEmotes[word]) {
        if (buf) { frag.appendChild(document.createTextNode(buf)); buf = ''; }
        appendEmote(frag, thirdPartyEmotes[word], word);
      } else {
        buf += word;
      }
    }
    if (buf) frag.appendChild(document.createTextNode(buf));
  }

  function appendEmote(frag, url, name) {
    var img = document.createElement('img');
    img.className = 'emote-img';
    img.alt = name; img.title = name;
    img.onerror = function() {
      if (this.parentNode) this.parentNode.replaceChild(document.createTextNode(this.alt), this);
    };
    img.src = url;
    frag.appendChild(img);
  }

  // ── Rendering ─────────────────────────────────────────────────────────
  // (#1) Opacity-only fade, then remove — no layout transitions
  // (#4) Store timeout ID so trim() can clear it
  function scheduleFade(el) {
    el._fadeTimer = setTimeout(function() {
      el.classList.add('dying');
      // Remove after opacity transition completes (1.5s + 100ms buffer)
      el._fadeTimer = setTimeout(function() {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, 1600);
    }, FADE_AFTER);
  }

  function addMsg(m) {
    var div = document.createElement('div');
    div.className = 'msg';
    var badgePairs = parseBadges(m.badges);
    if (badgePairs.length) {
      var wrap = document.createElement('span');
      wrap.className = 'badges';
      var added = 0;
      for (var i = 0; i < badgePairs.length; i++) {
        var url = getBadgeUrl(badgePairs[i].set, badgePairs[i].version);
        if (url) {
          var bimg = document.createElement('img');
          bimg.className = 'badge-img';
          bimg.setAttribute('data-set', badgePairs[i].set);
          bimg.setAttribute('data-version', badgePairs[i].version);
          bimg.alt = badgePairs[i].set; bimg.title = badgePairs[i].set;
          bimg.onerror = function() { this.style.display = 'none'; };
          bimg.src = url;
          wrap.appendChild(bimg);
          added++;
        }
      }
      if (added) div.appendChild(wrap);
    }
    var nameEl = document.createElement('span');
    nameEl.className = 'username';
    nameEl.style.color = m.color;
    nameEl.textContent = m.display;
    div.appendChild(nameEl);
    var colon = document.createElement('span');
    colon.className = 'colon';
    colon.textContent = ':';
    div.appendChild(colon);
    var body = document.createElement('span');
    body.className = 'body';
    body.appendChild(buildBody(m.text, m.emotes));
    div.appendChild(body);
    feed.appendChild(div);
    trim();
    scheduleFade(div);
  }

  function addSys(text) {
    var div = document.createElement('div');
    div.className = 'sysmsg';
    div.textContent = '★ ' + text;
    feed.appendChild(div);
    trim();
    scheduleFade(div);
  }

  // (#4) Clear pending fade timers on trimmed elements
  function trim() {
    while (feed.children.length > MAX_MSGS) {
      var el = feed.firstChild;
      if (el._fadeTimer) clearTimeout(el._fadeTimer);
      feed.removeChild(el);
    }
  }

  function parseBadges(raw) {
    if (!raw) return [];
    var out = [], parts = raw.split(',');
    for (var i = 0; i < parts.length; i++) {
      var slash = parts[i].indexOf('/');
      if (slash > -1) out.push({ set: parts[i].slice(0, slash), version: parts[i].slice(slash + 1) });
    }
    return out;
  }

  function autoColor(nick) {
    var h = 0;
    for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
    return 'hsl(' + (Math.abs(h) % 360) + ',65%,65%)';
  }

  connect();
}
</script>
</body>
</html>
