<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Chat Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
}

#feed {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 4px;
  padding: 10px;
  max-height: 100vh;
  overflow: hidden;
}

.msg {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 4px;
  line-height: 1.5;
  word-break: break-word;
  overflow-wrap: anywhere;
  background: rgba(0, 0, 0, 0.22);
  border-radius: 6px;
  padding: 4px 8px;
  transition: opacity 1.5s ease,
              max-height 0.6s ease 1.4s,
              padding 0.6s ease 1.4s,
              margin 0.6s ease 1.4s;
  max-height: 200px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.dying {
  opacity: 0 !important;
  max-height: 0 !important;
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  margin: 0 !important;
  pointer-events: none;
}

.badges {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
  position: relative;
  top: 2px;
}
.badge-img {
  width: 18px;
  height: 18px;
  display: block;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.85));
}
.badge-img[data-broken="1"] { display: none; }

.username {
  font-weight: 700;
  flex-shrink: 0;
  text-shadow:
    0 0 6px rgba(0,0,0,0.95),
    0 1px 4px rgba(0,0,0,1),
    1px 1px 0 rgba(0,0,0,0.85);
}
.colon {
  color: rgba(255,255,255,0.45);
  flex-shrink: 0;
  text-shadow: 0 1px 3px rgba(0,0,0,1);
}
.body {
  display: inline;
  color: #f0f0f0;
  text-shadow:
    0 0 5px rgba(0,0,0,0.95),
    0 1px 4px rgba(0,0,0,1),
    1px 1px 0 rgba(0,0,0,0.85);
}

.emote-img {
  display: inline-block;
  height: 22px;
  width: auto;
  vertical-align: middle;
  margin: 0 1px;
  position: relative;
  top: -1px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
}

.sysmsg {
  font-size: 12px;
  font-style: italic;
  color: #cc88ff;
  padding: 3px 8px;
  text-shadow: 0 1px 4px rgba(0,0,0,1);
  animation: fadeIn 0.2s ease;
  transition: opacity 1.5s ease,
              max-height 0.6s ease 1.4s,
              padding 0.6s ease 1.4s,
              margin 0.6s ease 1.4s;
  max-height: 200px;
}
.sysmsg.dying {
  opacity: 0 !important;
  max-height: 0 !important;
  padding-top: 0 !important;
  padding-bottom: 0 !important;
  margin: 0 !important;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="feed"></div>
<script>
// ─── CONFIG ──────────────────────────────────────
var CHANNEL    = 'toni_sins__';
var MAX_MSGS   = 25;
var FADE_AFTER = 30000; // ms — use 999999999 to disable fading
// ─────────────────────────────────────────────────

var feed = document.getElementById('feed');
var ws = null, retryTimer = null;
var roomId = null, dataLoaded = false;

// badge storage: badgeMap[setName][version] = url
var badgeMap = {};

// third-party emote lookup: word -> image url
// populated from BTTV + FFZ + 7TV on connect
var thirdPartyEmotes = {};

// ── Badge CDN fallbacks ───────────────────────────────────────────────────
// Used when the API hasn't responded yet or fails.
var BCDN = 'https://static-cdn.jtvnw.net/badges/v1/';
var BADGE_FALLBACKS = {
  'broadcaster': BCDN + '5527c58c-fb7d-422d-b71b-f309dcb85cc1/2',
  'moderator':   BCDN + '3267646d-33f0-4b17-b3df-f923a41db1d0/2',
  'vip':         BCDN + 'b817aba4-fad8-49e2-b88a-7cc744dfa6ec/2',
  'subscriber':  BCDN + '5d9f2208-5dd8-11e7-8513-2ff4adfae661/2',
  'premium':     BCDN + 'bbbe0db0-a598-423e-86d0-f9fb98ca1933/2',
  'turbo':       BCDN + 'bd444ec6-8f34-4bf9-91f4-af1e3428d80f/2',
  'partner':     BCDN + 'd12a2e27-16f6-41d0-ab77-b780518f00a3/2',
  'staff':       BCDN + 'd97c37be-e797-4a18-a3ae-31d92135e8a0/2',
  'bits':        BCDN + '73b5c3fb-24f9-4a82-a852-2f475ad29d43/2',
};

function getBadgeUrl(setName, version) {
  if (badgeMap[setName]) {
    return badgeMap[setName][version] || badgeMap[setName]['0'] || null;
  }
  return BADGE_FALLBACKS[setName] || null;
}

// ── Data loading (badges + third-party emotes) ────────────────────────────
function loadAllData(rId) {
  loadBadges(rId);
  loadBTTV(rId);
  loadFFZ();
  load7TV(rId);
}

function loadBadges(rId) {
  function ingest(data) {
    var sets = data && data.badge_sets;
    if (!sets) return;
    Object.keys(sets).forEach(function(setName) {
      var versions = sets[setName].versions || {};
      if (!badgeMap[setName]) badgeMap[setName] = {};
      Object.keys(versions).forEach(function(ver) {
        badgeMap[setName][ver] =
          versions[ver].image_url_2x || versions[ver].image_url_1x;
      });
    });
  }
  // Global badges
  fetch('https://badges.twitch.tv/v1/badges/global/display')
    .then(function(r) { return r.json(); })
    .then(ingest)
    .catch(function() {});
  // Channel-specific badges (custom sub tiers etc.)
  fetch('https://badges.twitch.tv/v1/badges/channels/' + rId + '/display')
    .then(function(r) { return r.json(); })
    .then(ingest)
    .catch(function() {});
}

function loadBTTV(rId) {
  // Global BTTV emotes
  fetch('https://api.betterttv.net/3/cached/emotes/global')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!Array.isArray(data)) return;
      data.forEach(function(e) {
        thirdPartyEmotes[e.code] = 'https://cdn.betterttv.net/emote/' + e.id + '/2x';
      });
    })
    .catch(function() {});
  // Channel BTTV emotes (channelEmotes + sharedEmotes)
  fetch('https://api.betterttv.net/3/cached/users/twitch/' + rId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var emotes = (data.channelEmotes || []).concat(data.sharedEmotes || []);
      emotes.forEach(function(e) {
        thirdPartyEmotes[e.code] = 'https://cdn.betterttv.net/emote/' + e.id + '/2x';
      });
    })
    .catch(function() {});
}

function loadFFZ() {
  // FFZ uses channel name (not numeric ID)
  fetch('https://api.frankerfacez.com/v1/room/' + CHANNEL)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var sets = data.sets || {};
      Object.keys(sets).forEach(function(setId) {
        var emoticons = sets[setId].emoticons || [];
        emoticons.forEach(function(e) {
          if (!e.name || !e.urls) return;
          var url = e.urls['2'] || e.urls['1'];
          if (!url) return;
          // FFZ URLs are sometimes protocol-relative (//)
          if (url.slice(0, 2) === '//') url = 'https:' + url;
          thirdPartyEmotes[e.name] = url;
        });
      });
    })
    .catch(function() {});
}

function load7TV(rId) {
  // Global 7TV emotes
  fetch('https://7tv.io/v3/emote-sets/global')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var emotes = data.emotes || [];
      emotes.forEach(function(e) {
        if (e.name && e.id) {
          thirdPartyEmotes[e.name] = 'https://cdn.7tv.app/emote/' + e.id + '/2x.webp';
        }
      });
    })
    .catch(function() {});
  // Channel 7TV emotes
  fetch('https://7tv.io/v3/users/twitch/' + rId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var emotes = (data.emote_set && data.emote_set.emotes) || [];
      emotes.forEach(function(e) {
        if (e.name && e.id) {
          thirdPartyEmotes[e.name] = 'https://cdn.7tv.app/emote/' + e.id + '/2x.webp';
        }
      });
    })
    .catch(function() {});
}

// ── IRC connection ────────────────────────────────────────────────────────
function connect() {
  if (ws) {
    ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
    ws.close();
    ws = null;
  }
  if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }

  ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  ws.onopen = function() {
    ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
    ws.send('PASS SCHMOOPIIE');
    ws.send('NICK justinfan' + (10000 + Math.floor(Math.random() * 80000)));
    ws.send('JOIN #' + CHANNEL);
  };

  ws.onmessage = function(evt) {
    var lines = evt.data.split('\r\n');
    for (var i = 0; i < lines.length; i++) {
      if (lines[i]) onLine(lines[i]);
    }
  };

  ws.onclose = function() { retryTimer = setTimeout(connect, 4000); };
  ws.onerror = function() { ws.close(); };
}

function onLine(line) {
  if (line.slice(0, 4) === 'PING') {
    if (ws && ws.readyState === 1) ws.send('PONG :tmi.twitch.tv');
    return;
  }

  var tags = {};
  if (line.charAt(0) === '@') {
    var sp    = line.indexOf(' ');
    var pairs = line.slice(1, sp).split(';');
    for (var i = 0; i < pairs.length; i++) {
      var eq = pairs[i].indexOf('=');
      if (eq > -1) tags[pairs[i].slice(0, eq)] = pairs[i].slice(eq + 1);
    }
    line = line.slice(sp + 1);
  }

  var parts  = line.split(' ');
  var prefix = parts[0];
  var cmd    = parts[1];

  // ROOMSTATE gives us the room-id we need for all API calls
  if (cmd === 'ROOMSTATE' && tags['room-id'] && !dataLoaded) {
    dataLoaded = true;
    roomId = tags['room-id'];
    loadAllData(roomId);
  }

  if (cmd === 'PRIVMSG') {
    var bang = prefix.indexOf('!');
    var nick = bang > -1 ? prefix.slice(1, bang) : prefix.slice(1);
    var ci   = line.indexOf(':', line.indexOf('PRIVMSG'));
    var text = ci > -1 ? line.slice(ci + 1) : '';
    addMsg({
      display: tags['display-name'] || nick,
      color:   tags['color']        || autoColor(nick),
      badges:  tags['badges']       || '',
      emotes:  tags['emotes']       || '',
      text:    text
    });
  }

  if (cmd === 'USERNOTICE') {
    var sys = (tags['system-msg'] || '').replace(/\\s/g, ' ');
    if (sys) addSys(sys);
  }
}

// ── Emote parsing ─────────────────────────────────────────────────────────
function getEmoteUrl(id) {
  return 'https://static-cdn.jtvnw.net/emoticons/v2/' + id + '/default/dark/2.0';
}

// Parse Twitch emote tag into sorted list of {id, start, end}
function parseTwitchEmotes(tag) {
  if (!tag) return [];
  var result = [];
  var groups = tag.split('/');
  for (var i = 0; i < groups.length; i++) {
    if (!groups[i]) continue;
    var colon = groups[i].indexOf(':');
    if (colon < 0) continue;
    var id     = groups[i].slice(0, colon);
    var ranges = groups[i].slice(colon + 1).split(',');
    for (var j = 0; j < ranges.length; j++) {
      var dash = ranges[j].indexOf('-');
      if (dash < 0) continue;
      result.push({
        id:    id,
        start: parseInt(ranges[j].slice(0, dash), 10),
        end:   parseInt(ranges[j].slice(dash + 1), 10) // inclusive
      });
    }
  }
  result.sort(function(a, b) { return a.start - b.start; });
  return result;
}

// Split a JS string into Unicode codepoints (handles emoji / surrogate pairs)
function toCodepoints(str) {
  var arr = [];
  for (var i = 0; i < str.length; ) {
    var code = str.codePointAt(i);
    arr.push(String.fromCodePoint(code));
    i += code > 0xFFFF ? 2 : 1;
  }
  return arr;
}

// Build the full message body as a DocumentFragment.
// Twitch emote positions take priority; remaining text is scanned for
// third-party emotes word-by-word.
function buildBody(text, emoteTag) {
  var frag   = document.createDocumentFragment();
  var twitch = parseTwitchEmotes(emoteTag);
  var chars  = toCodepoints(text);
  var cursor = 0;

  for (var e = 0; e < twitch.length; e++) {
    var em = twitch[e];
    // Text segment before this Twitch emote
    if (em.start > cursor) {
      appendThirdParty(frag, chars.slice(cursor, em.start).join(''));
    }
    // Twitch native emote image
    appendEmote(frag, getEmoteUrl(em.id), chars.slice(em.start, em.end + 1).join(''));
    cursor = em.end + 1;
  }

  // Remaining text after last Twitch emote
  if (cursor < chars.length) {
    appendThirdParty(frag, chars.slice(cursor).join(''));
  }

  return frag;
}

// Split a text segment by spaces and replace known third-party emote words
// with images. Preserves spaces and unknown words as text nodes.
function appendThirdParty(frag, text) {
  var words = text.split(' ');
  for (var i = 0; i < words.length; i++) {
    if (i > 0) frag.appendChild(document.createTextNode(' '));
    var word = words[i];
    if (!word) continue;
    var url = thirdPartyEmotes[word];
    if (url) {
      appendEmote(frag, url, word);
    } else {
      frag.appendChild(document.createTextNode(word));
    }
  }
}

// Create an emote <img> and append to a fragment.
// On error, fall back to showing the alt text so nothing disappears silently.
function appendEmote(frag, url, name) {
  var img = document.createElement('img');
  img.className = 'emote-img';
  img.alt   = name;
  img.title = name;
  img.onerror = function() {
    if (this.parentNode) {
      this.parentNode.replaceChild(document.createTextNode(this.alt), this);
    }
  };
  img.src = url;
  frag.appendChild(img);
}

// ── Rendering ─────────────────────────────────────────────────────────────
function scheduleFade(el) {
  setTimeout(function() {
    el.classList.add('dying');
    setTimeout(function() {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 2700);
  }, FADE_AFTER);
}

function addMsg(m) {
  var div = document.createElement('div');
  div.className = 'msg';

  // Badges
  var badgePairs = parseBadges(m.badges);
  if (badgePairs.length) {
    var wrap = document.createElement('span');
    wrap.className = 'badges';
    var added = 0;
    for (var i = 0; i < badgePairs.length; i++) {
      var url = getBadgeUrl(badgePairs[i].set, badgePairs[i].version);
      if (url) {
        var bimg = document.createElement('img');
        bimg.className = 'badge-img';
        bimg.alt   = badgePairs[i].set;
        bimg.title = badgePairs[i].set;
        bimg.onerror = function() { this.setAttribute('data-broken', '1'); };
        bimg.src = url;
        wrap.appendChild(bimg);
        added++;
      }
    }
    if (added) div.appendChild(wrap);
  }

  // Username
  var nameEl = document.createElement('span');
  nameEl.className = 'username';
  nameEl.style.color = m.color;
  nameEl.textContent = m.display;
  div.appendChild(nameEl);

  // Colon separator
  var colon = document.createElement('span');
  colon.className = 'colon';
  colon.textContent = ':';
  div.appendChild(colon);

  // Message body (Twitch emotes + third-party emotes + plain text)
  var body = document.createElement('span');
  body.className = 'body';
  body.appendChild(buildBody(m.text, m.emotes));
  div.appendChild(body);

  feed.appendChild(div);
  trim();
  scheduleFade(div);
}

function addSys(text) {
  var div = document.createElement('div');
  div.className = 'sysmsg';
  div.textContent = '★ ' + text;
  feed.appendChild(div);
  trim();
  scheduleFade(div);
}

function trim() {
  while (feed.children.length > MAX_MSGS) {
    feed.removeChild(feed.firstChild);
  }
}

function parseBadges(raw) {
  if (!raw) return [];
  var out = [], parts = raw.split(',');
  for (var i = 0; i < parts.length; i++) {
    var slash = parts[i].indexOf('/');
    if (slash > -1) {
      out.push({ set: parts[i].slice(0, slash), version: parts[i].slice(slash + 1) });
    }
  }
  return out;
}

function autoColor(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  return 'hsl(' + (Math.abs(h) % 360) + ',65%,65%)';
}

connect();
</script>
</body>
</html>
